<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — documente</title>
  <link rel="stylesheet" href="/landing.css">
  <style>
    body {
      min-height: 100vh; margin: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background:
        radial-gradient(700px 400px at 15% 0%, #e9f2ff 0%, transparent 60%),
        radial-gradient(700px 400px at 85% 100%, #f1edff 0%, transparent 60%);
    }
    .auth-card {
      width: 100%; max-width: 400px; background: #fff; border: 1px solid var(--border);
      border-radius: 14px; padding: 32px; box-shadow: 0 24px 60px -30px rgba(20,33,61,.35);
    }
    .auth-logo { text-align: center; margin-bottom: 22px; font-size: 22px; font-weight: 800; }
    .auth-tabs { display: flex; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 22px; overflow: hidden; }
    .auth-tabs button {
      flex: 1; border: none; background: #fff; padding: 10px; font-size: 15px; font-weight: 600;
      color: var(--ink-soft); cursor: pointer;
    }
    .auth-tabs button.active { background: var(--accent); color: #fff; }
    .auth-card label { display: block; font-size: 13.5px; font-weight: 600; margin: 14px 0 5px; }
    .auth-card input {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 15px; outline: none;
    }
    .auth-card input:focus { border-color: var(--accent); }
    .auth-submit {
      width: 100%; margin-top: 22px; padding: 12px; border: none; border-radius: 8px;
      background: var(--accent); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .auth-submit:hover { background: var(--accent-dark); }
    .auth-submit:disabled { opacity: .6; cursor: wait; }
    .auth-error {
      display: none; margin-top: 14px; padding: 10px 12px; border-radius: 8px;
      background: #ffeceb; color: #ae2a19; font-size: 14px;
    }
    .auth-back { margin-top: 18px; font-size: 14px; }
    .auth-back a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo"><span class="lp-logo-mark">d.</span> documente</div>
    <div class="auth-tabs">
      <button id="tab-login" type="button">Entrar</button>
      <button id="tab-register" type="button">Criar conta</button>
    </div>
    <form id="auth-form">
      <div id="field-name" hidden>
        <label for="name">Nome</label>
        <input id="name" autocomplete="name" placeholder="Como o time vai te ver">
      </div>
      <label for="email">E-mail</label>
      <input id="email" type="email" required autocomplete="email" placeholder="voce@empresa.com.br">
      <label for="password">Senha</label>
      <input id="password" type="password" required minlength="6" autocomplete="current-password" placeholder="mínimo 6 caracteres">
      <button class="auth-submit" id="submit" type="submit">Entrar</button>
      <div class="auth-error" id="error"></div>
    </form>
  </div>
  <div class="auth-back"><a href="/">← voltar para a página inicial</a></div>

  <script>
    const tabs = { login: document.getElementById('tab-login'), register: document.getElementById('tab-register') }
    const fieldName = document.getElementById('field-name')
    const submit = document.getElementById('submit')
    const errorEl = document.getElementById('error')
    let mode = location.hash === '#registro' ? 'register' : 'login'

    function setMode (m) {
      mode = m
      tabs.login.classList.toggle('active', m === 'login')
      tabs.register.classList.toggle('active', m === 'register')
      fieldName.hidden = m === 'login'
      document.getElementById('name').required = m === 'register'
      submit.textContent = m === 'login' ? 'Entrar' : 'Criar conta'
      errorEl.style.display = 'none'
    }
    tabs.login.onclick = () => setMode('login')
    tabs.register.onclick = () => setMode('register')
    setMode(mode)

    // já logado? vai direto para o app
    fetch('/api/auth/me').then(r => { if (r.ok) location.href = '/app' })

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      submit.disabled = true
      errorEl.style.display = 'none'
      try {
        const body = {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        }
        if (mode === 'register') body.name = document.getElementById('name').value
        const res = await fetch('/api/auth/' + mode, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Erro inesperado.')
        location.href = '/app'
      } catch (err) {
        errorEl.textContent = err.message
        errorEl.style.display = 'block'
        submit.disabled = false
      }
    })
  </script>
</body>
</html>
